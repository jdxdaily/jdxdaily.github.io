name: Daily Briefing

on:
  push:
    branches: [main]
    paths:
      - 'briefings/**'
      - 'index.html'
  workflow_dispatch: # allow manual trigger for testing

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install weasyprint + system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libcairo2 \
            fonts-liberation shared-mime-info
          pip install weasyprint

      - name: Generate PDFs and update archive
        run: python scripts/update_site.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: auto-update PDFs and archive [skip ci]"
            git push
          fi
